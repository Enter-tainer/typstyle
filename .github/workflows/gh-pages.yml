name: GitHub Pages
on:
  push:
    branches:
      - master
    tags:
      - "v*"
  pull_request:
    branches:
      - master
    paths:
      - "playground/**"
      - "docs/**"
      - "crates/typstyle-core/**"
      - "crates/typstyle-wasm/**"
      - ".github/workflows/gh-pages.yml"
  workflow_dispatch:

permissions:
  contents: write # Needed for checkout and potentially other steps

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-prepare-artifact: # Renamed for clarity
    name: Build Docs & Playground and Prepare Artifact
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          target: wasm32-unknown-unknown
      - name: Install wasm-pack
        uses: taiki-e/install-action@wasm-pack
      - name: Install Bun
        uses: oven-sh/setup-bun@v1
      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Build playground
        working-directory: playground
        run: |
          bun build:wasm
          bun install
          # Assumes vite.config.ts has base: '/<repo>/playground/'
          bun run build --outDir dist

      - name: Build docs site
        run: |
          uv sync
          # Assumes mkdocs.yml site_url is 'https://<user>.github.io/<repo>/'
          # and nav link to playground is 'playground/index.html'
          uv run mkdocs build # Outputs to ./site by default

      - name: Assemble deployment artifact
        run: |
          # Create root for the artifact
          mkdir -p deployment_artifact

          cp -r site/* deployment_artifact/

          # Copy the playground/dist directory as deployment_artifact/playground
          cp -r playground/dist deployment_artifact/playground

      - name: Upload artifact for deployment
        uses: actions/upload-pages-artifact@v3
        with:
          # This path will be the root of what 'actions/deploy-pages' deploys
          path: "deployment_artifact"

  deploy:
    name: Deploy to GitHub Pages
    needs: build-and-prepare-artifact
    # Deploy on push to master, or manual workflow dispatch
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
